{% extends "templates/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>
<p style="margin: 1rem 0;">Latest articles and updates</p>

<div style="margin: 2rem 0;">
    {% for post in posts %}
    <article style="background: #f9f9f9; padding: 1.5rem; margin-bottom: 1rem; border-radius: 4px; border-left: 4px solid #2563eb;">
        <h2 style="margin-bottom: 0.5rem;">
            <a href="/blog/{{ post.slug }}" style="color: #2563eb; text-decoration: none;">
                {{ post.title }}
            </a>
        </h2>
        <p style="color: #666; font-size: 0.9rem;">
            By {{ post.author }} | {{ post.date }}
        </p>
    </article>
    {% endfor %}
</div>
{% endblock %}
